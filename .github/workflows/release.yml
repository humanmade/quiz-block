name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release:
        name: Create Release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Get version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: Set up Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Build release ZIP
              run: |
                  mkdir -p dist
                  zip -r dist/quiz-block-plugin-${{ steps.version.outputs.VERSION }}.zip . \
                    --exclude="*.git*" \
                    --exclude="node_modules/*" \
                    --exclude="vendor/*" \
                    --exclude=".github/*" \
                    --exclude="dist/*" \
                    --exclude="src/*" \
                    --exclude="composer.json" \
                    --exclude="composer.lock" \
                    --exclude="package.json" \
                    --exclude="package-lock.json" \
                    --exclude="phpcs.xml" \
                    --exclude="phpstan.neon" \
                    --exclude="eslint.config.mjs" \
                    --exclude=".stylelintrc.json" \
                    --exclude=".gitignore" \
                    --exclude="CHANGELOG.md" \
                    --exclude="languages/.gitkeep"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  files: dist/quiz-block-plugin-${{ steps.version.outputs.VERSION }}.zip
                  generate_release_notes: true
                  body: |
                      See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
